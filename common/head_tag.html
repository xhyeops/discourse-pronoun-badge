<script type="text/discourse-plugin" version="0.8">
const fieldName = settings.pronoun_user_field_name;
const borderColor = settings.pronoun_border_color;
const textColor = settings.pronoun_text_color;
const bgColor = settings.pronoun_background_color;

document.documentElement.style.setProperty('--pronoun-border-color', borderColor);
document.documentElement.style.setProperty('--pronoun-text-color', textColor);
document.documentElement.style.setProperty('--pronoun-background-color', bgColor);

function getPronounFieldId() {
  const siteUserFields = api.container.lookup("site:main").user_fields;
  if (!siteUserFields) return null;
  const field = siteUserFields.find(f => f.name === fieldName);
  return field ? field.id : null;
}

function createBadgeHTML(pronoun) {
  if (!pronoun || !pronoun.trim()) return '';
  const escaped = Handlebars.Utils.escapeExpression(pronoun);
  const withEmoji = require("discourse/lib/text").emojiUnescape(escaped);
  return '<span class="pronoun-badge" title="Pronomes">' + withEmoji + '</span>';
}

api.decorateWidget("poster-name:after", helper => {
  const post = helper.attrs;
  if (!post) return;

  const fieldId = getPronounFieldId();
  if (!fieldId) return;

  const userCustomFields = post.user_custom_fields;
  if (userCustomFields) {
    const pronoun = userCustomFields["user_field_" + fieldId];
    if (pronoun) {
      return helper.rawHtml(createBadgeHTML(pronoun));
    }
  }

  return null;
});

api.modifyClass("component:user-card-contents", {
  pluginId: "pronoun-badge",

  didReceiveAttrs() {
    this._super(...arguments);
    this._updatePronoun();
  },

  _updatePronoun() {
    const user = this.user;
    if (!user || !user.user_fields) {
      this.set("pronounBadgeHTML", null);
      return;
    }

    const fieldId = getPronounFieldId();
    if (!fieldId) {
      this.set("pronounBadgeHTML", null);
      return;
    }

    const pronoun = user.user_fields[fieldId];
    this.set("pronounBadgeHTML", pronoun ? createBadgeHTML(pronoun) : null);
  }
});
</script>
